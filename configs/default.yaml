# 默认配置面向单张普通 GPU（约 8 GB 或更高显存）。
# 没有 GPU 时请先用 configs/cpu_smoke.yaml 验证完整流程。
seed: 42
device: auto                   # auto / cuda / cpu
output_dir: runs

dataset:
  path: ../datasets/imagenet-10
  image_size: 64
  batch_size: 16
  num_workers: 4
  random_horizontal_flip: true

model:
  name: unet                   # unet 或 dit
  in_channels: 3
  unet:
    base_channels: 64
    time_embed_dim: 256
  dit:
    patch_size: 8
    hidden_dim: 384
    depth: 6
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0

diffusion:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  pred_type: epsilon           # epsilon / x0 / v / score

training:
  epochs: 100
  learning_rate: 0.0002
  weight_decay: 0.0
  grad_clip: 1.0
  use_amp: true
  log_every_steps: 100
  save_every_epochs: 5
  sample_every_epochs: 5
  sample_count: 16
  max_steps: null              # 调试时可设为很小的整数；null 表示不限制
